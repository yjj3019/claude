name: Validate FEF Harness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_repository.py
      - run: python scripts/validate_routes.py
      - run: python scripts/run_golden_tests.py --validate-only
      - run: python -m unittest tests/test_harness.py
      - run: python scripts/validate_fable_benchmark.py --validate-only
      - run: python -m unittest tests.test_fable_benchmark tests.test_fable_pilot tests.test_fable_pilot_check tests.test_fable_response_import tests.test_fable_model_evidence tests.test_fable_blinding tests.test_fable_scoring tests.test_fable_leakage tests.test_fable_holdout
      - run: python scripts/prepare_fable_pilot.py --check --output tests/results/fable/PILOT-A-plan.json
