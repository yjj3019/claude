name: Validate FEF Harness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_repository.py
      - run: python scripts/validate_routes.py
      - run: python scripts/run_golden_tests.py --validate-only
      - run: python -m unittest tests/test_harness.py
